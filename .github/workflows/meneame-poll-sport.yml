name: "[Sport] Meneame Poll"

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production-sport
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline
      - run: npx tsx src/run-poll.ts meneame
        env:
          DISCOVERSNOOP_TOKEN: ${{ secrets.DISCOVERSNOOP_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          OWN_MEDIA_DOMAINS: ${{ secrets.OWN_MEDIA_DOMAINS }}
          FEEDS_PATH: feeds-sport.json
