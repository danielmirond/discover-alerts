name: Cultural Poll (Netflix + FlixPatrol)

on:
  schedule:
    - cron: '0 */6 * * *' # cada 6h
  workflow_dispatch:

concurrency:
  group: cultural-poll
  cancel-in-progress: true

jobs:
  poll:
    runs-on: [self-hosted, linux, x64, polls]
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline
      - run: npx tsx src/run-poll.ts cultural
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
