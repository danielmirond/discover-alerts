<script type="text/babel" data-presets="react">
const D = window.DA_DATA;

/* ---------------- Theme switch ---------------- */
function ThemeSwitch() {
  const [active, setActive] = useState(document.body.dataset.theme || 'light');
  const themes = [
    { id: 'light', label: 'Claro' },
    { id: 'dark', label: 'Oscuro' },
    { id: 'terminal', label: 'Terminal' },
  ];
  const pick = (id) => {
    document.body.dataset.theme = id;
    try { localStorage.setItem('da.theme', id); } catch (e) {}
    setActive(id);
  };
  useEffect(() => {
    try {
      const saved = localStorage.getItem('da.theme');
      if (saved) { document.body.dataset.theme = saved; setActive(saved); }
    } catch (e) {}
  }, []);
  return (
    <div className="theme-switch" style={{ display: 'inline-flex', gap: 4, marginLeft: 12 }}>
      {themes.map(t => (
        <span key={t.id}
              onClick={() => pick(t.id)}
              title={`Tema: ${t.label}`}
              style={{
                cursor: 'pointer',
                fontFamily: 'var(--mono)',
                fontSize: 9,
                letterSpacing: '0.08em',
                textTransform: 'uppercase',
                padding: '2px 6px',
                border: '1px solid ' + (active === t.id ? 'var(--ink)' : 'var(--rule)'),
                background: active === t.id ? 'var(--ink)' : 'transparent',
                color: active === t.id ? 'var(--paper)' : 'var(--ink-3)',
                borderRadius: 2,
              }}>
          {t.label.slice(0, 3)}
        </span>
      ))}
    </div>
  );
}

/* ---------------- Masthead ---------------- */
function Masthead({ activeNav, setActiveNav, clock, counts = {} }) {
  const navs = [
    { id: 'feed', label: 'Feed en vivo', count: counts.feed },
    { id: 'huecos', label: 'Huecos', count: counts.huecos },
    { id: 'sucesos', label: 'Sucesos', count: counts.sucesos },
    { id: 'boe', label: 'BOE', count: counts.boe },
    { id: 'trends', label: 'Google Trends', count: counts.trends },
    { id: 'xtrends', label: 'X/Twitter', count: counts.xtrends },
    { id: 'entidades', label: 'Entidades', count: counts.entidades },
    { id: 'categorias', label: 'Categorías DS', count: counts.categorias },
    { id: 'medios', label: 'Medios' },
    { id: 'publishers', label: 'Publishers DS', count: counts.publishers },
    { id: 'formulas', label: 'Fórmulas' },
    { id: 'patrones', label: 'Patrones' },
    { id: 'historico', label: 'Histórico' },
    { id: 'predicciones', label: 'Predicciones' },
    { id: 'cultural', label: 'Cultural' },
    { id: 'aemet', label: 'AEMET' },
    { id: 'configuracion', label: 'Config' },
  ];
  const fmtDate = clock.toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
  const fmtTime = clock.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  return (
    <header className="masthead">
      <div className="masthead-row">
        <div className="wordmark">
          <span className="dot"></span>
          DISCOVER<span style={{ color: 'var(--accent)' }}>·</span>ALERTS
        </div>
        <div className="datetime">
          <span>{fmtDate.toUpperCase()}</span>
          <span>·</span>
          <span>{fmtTime} CET</span>
          <span className="live">LIVE</span>
          <ThemeSwitch />
        </div>
      </div>
      <nav className="masthead-nav">
        {navs.map(n => (
          <div key={n.id}
               className={cx('nav-item', activeNav === n.id && 'active')}
               onClick={() => setActiveNav(n.id)}>
            {n.label}
            {n.count ? <span className="count">{n.count}</span> : null}
          </div>
        ))}
      </nav>
    </header>
  );
}

/* ---------------- Pollers status ---------------- */
function Pollers({ pollers }) {
  return (
    <div className="pollers">
      <span style={{ color: 'var(--ink-4)', marginRight: 4 }}>Fuentes</span>
      {pollers.map(p => (
        <div key={p.id} className={cx('poller', p.status !== 'ok' && p.status)}>
          <span className="pill"></span>
          <span className="label">{p.label}</span>
          <span className="t">· {p.last > 0 ? `${p.last}s · ` : ''}cada {Math.round(p.cadence/60)}m</span>
        </div>
      ))}
    </div>
  );
}

/* ---------------- Ticker ---------------- */
function Ticker({ data }) {
  const items = useMemo(() => {
    const out = [];
    // Top entities por velocity (rising/peaking)
    for (const e of (data.entities || []).slice(0, 6)) {
      const up = e.trend === 'up';
      const label = e.trend === 'up' ? (e.delta || '↑') : e.trend === 'down' ? (e.delta || '↓') : e.delta || '—';
      out.push({ t: e.name, v: label, up });
    }
    // Top trends por traffic
    for (const t of (data.trends || []).slice(0, 4)) {
      out.push({ t: t.title, v: `~${(t.traffic || 0).toLocaleString()}+`, up: true });
    }
    // Huecos activos
    for (const g of (data.gaps || []).slice(0, 3)) {
      out.push({ t: g.entity, v: `hueco · ${g.kind}`, up: true });
    }
    return out.length > 0 ? out : [{ t: 'Esperando primer poll', v: '…', up: true }];
  }, [data.entities, data.trends, data.gaps]);

  const row = (k) => (
    <React.Fragment key={k}>
      {items.map((it, i) => (
        <span key={i} className="ticker-item">
          <strong>{it.t}</strong><span className="sep">▸</span>
          <span className={it.up ? 'up' : 'dn'}>{it.v}</span>
        </span>
      ))}
    </React.Fragment>
  );
  return (
    <div className="ticker">
      <div className="ticker-label">LIVE</div>
      <div className="ticker-track">
        <div className="ticker-move">{row('a')}{row('b')}</div>
      </div>
    </div>
  );
}

/* ---------------- Filter bar ---------------- */
function FilterBar({ filter, setFilter, counts }) {
  // Chip especial "own_media" agrupa own_media + own_media_absent.
  // El matching de filter es por prefijo cuando id termina en ':*'.
  const chips = [
    { id: 'all', label: 'Todas', c: counts.all },
    { id: 'own_media:*', label: 'Own media', c: (counts.own_media || 0) + (counts.own_media_absent || 0), style: 'own-media' },
    { id: 'triple_match', label: 'Triple match', c: counts.triple_match },
    { id: 'trends_without_discover', label: 'Hueco SEO', c: counts.trends_without_discover },
    { id: 'discover_1h', label: 'Discover 1h', c: counts.discover_1h },
    { id: 'wikipedia_surge', label: 'Wikipedia surge', c: counts.wikipedia_surge },
    { id: 'meneame_hot', label: 'Menéame hot', c: counts.meneame_hot },
    { id: 'us_relevant', label: 'USA→ES', c: counts.us_relevant },
    { id: 'headline_pattern', label: 'Patrón titular', c: counts.headline_pattern },
  ];
  return (
    <div className="filter-bar">
      {chips.map(c => (
        <span key={c.id}
              className={cx('chip', filter === c.id && 'active', c.style === 'own-media' && 'chip-own-media')}
              onClick={() => setFilter(c.id)}>
          {c.label}{c.c != null ? <span className="c">{c.c}</span> : null}
        </span>
      ))}
      <span style={{ marginLeft: 'auto', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-4)', letterSpacing: '0.06em' }}>
        ORDEN · <strong style={{ color: 'var(--ink)' }}>TIEMPO REAL</strong> · <span>SCORE</span> · <span>VELOCIDAD</span>
      </span>
    </div>
  );
}

/* ---------------- Drawer detail ---------------- */
function Drawer({ alert, onClose, data }) {
  if (!alert) return null;

  // Enriquecimiento: primero probamos a resolver por entidad. Si no hay match,
  // caemos al resolver por TIPO (category, trends_*, headline_pattern, etc.)
  // para rellenar SIEMPRE la tarjeta con contexto relevante, no solo cuando
  // hay entidad asociada.
  const raw = (data && data._raw) || {};
  const ent = alert.entity && alert.entity !== '—'
    ? (raw.entities || []).find(e => e.name === alert.entity)
    : null;

  // Resolver por tipo cuando no hay entidad
  let typeContext = null;
  const alertType = alert.type || '';
  // Category alert → busca en data._raw.categories por nombre
  if (!ent && (alertType === 'category' || /^\/.+/.test(alert.headline || ''))) {
    const name = alert.headline || alert.category;
    const cat = (raw.categories || []).find(c => c.name === name || c.name === alert.category);
    if (cat) typeContext = { kind: 'category', cat };
  }
  // Trends-related alert → busca en raw.trends (depende de adapter, puede estar en raw o _raw)
  if (!ent && !typeContext && (alertType.startsWith('trends_') || /trend/i.test(alertType))) {
    // raw.trends shape puede ser Record<title, snap> (desde state directamente)
    const trendTitle = alert.headline || alert.entity;
    const trendsData = raw.trends || {};
    let trend = null;
    if (trendsData[trendTitle]) trend = { title: trendTitle, ...trendsData[trendTitle] };
    else {
      // buscar substring match
      for (const [t, snap] of Object.entries(trendsData)) {
        if (t.toLowerCase().includes(String(trendTitle).toLowerCase()) || String(trendTitle).toLowerCase().includes(t.toLowerCase())) {
          trend = { title: t, ...(snap || {}) };
          break;
        }
      }
    }
    if (trend) typeContext = { kind: 'trend', trend };
  }
  // Headline pattern → el title suele ser el ngram
  if (!ent && !typeContext && alertType === 'headline_pattern') {
    const ngram = alert.headline;
    const patterns = raw.headlinePatterns || [];
    const pat = patterns.find(p => p.ngram === ngram);
    if (pat || ngram) typeContext = { kind: 'headline_pattern', ngram, pattern: pat };
  }

  // Fallback search: si no hay topPages del ent, buscar en raw.pagesSlim por substring.
  function searchSlimPages(query) {
    if (!query) return [];
    const q = String(query).toLowerCase();
    if (q.length < 3) return [];
    return (raw.pagesSlim || [])
      .filter(p => (p.title || '').toLowerCase().includes(q))
      .slice(0, 5);
  }
  function searchSlimArticles(query) {
    if (!query) return [];
    const q = String(query).toLowerCase();
    if (q.length < 3) return [];
    return (raw.mediaArticlesSlim || [])
      .filter(a => (a.title || '').toLowerCase().includes(q))
      .slice(0, 10);
  }

  let topPages = (ent && ent.topPages) || (typeContext?.kind === 'category' ? (typeContext.cat.topPages || []) : []);
  if (topPages.length === 0 && alert.entity && alert.entity !== '—') {
    topPages = searchSlimPages(alert.entity);
  }
  let matchingArticles = (ent && ent.matchingArticles) || [];
  if (matchingArticles.length === 0 && alert.entity && alert.entity !== '—') {
    matchingArticles = searchSlimArticles(alert.entity).map(a => ({ title: a.title, link: a.link, feedName: a.feedName }));
  }
  const googleTrends = (ent && ent.matchingGoogleTrends) || [];
  const xTrends = (ent && ent.matchingXTrends) || [];
  // Si alert.examples viene vacío y tenemos matchingArticles del fallback, usar esos como enlaces
  const examples = (alert.examples && alert.examples.length > 0)
    ? alert.examples
    : (matchingArticles.slice(0, 4).map(a => ({ title: a.title, url: a.link, source: a.feedName })));
  const topImage = (topPages.find(p => p.image) || {}).image || alert.imageUrl;
  // Entidades relacionadas: misma categoría, mismo topic, o entidades del typeContext
  const related = ent
    ? (raw.entities || [])
        .filter(e => e.name !== ent.name && (
          (ent.category && e.category === ent.category) ||
          (ent.topic && e.topic === ent.topic)
        ))
        .slice(0, 8)
    : (typeContext?.kind === 'category' ? (typeContext.cat.topEntities || []).slice(0, 12) : []);

  return (
    <>
      <div className={cx('drawer-backdrop', alert && 'open')} onClick={onClose}></div>
      <aside className={cx('drawer', alert && 'open')}>
        <button className="drawer-close" onClick={onClose}>ESC · cerrar</button>
        <div className="drawer-inner">
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 6 }}>
            <Tag kind="accent">{alert.typeLabel}</Tag>
            {alert.category && alert.category !== '—' && <Tag kind="ghost">{alert.category}</Tag>}
            {ent && ent.topic && <Tag kind="accent">{ent.topic}</Tag>}
            <VelocityBadge velocity={alert.velocity} ratio={alert.velocityRatio} />
          </div>
          <h1>{alert.headline}</h1>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-3)', letterSpacing: '0.04em', marginBottom: 4 }}>
            {alert.ts} · {alert.ago} · entidad ▸ <strong style={{ color: 'var(--ink)' }}>{alert.entity}</strong>
          </div>
          <p style={{ fontFamily: 'var(--serif)', fontSize: 15, lineHeight: 1.5, color: 'var(--ink-2)', margin: '10px 0 4px' }}>{alert.snippet}</p>

          <div className="drawer-section">
            <h3>Señales de esta alerta</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Score Discover</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 800, color: 'var(--accent)' }}>{ent ? ent.score : (alert.discoverScore ?? '—')}</div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Posición feed</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 800 }}>{ent && ent.position ? '#'+ent.position : (alert.feedPos != null ? '#'+alert.feedPos : '—')}</div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Apariciones 6h</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 800 }}>{ent ? (ent.appearancesLast6h || 0) : alert.publications}</div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Velocidad</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 800 }}>×{alert.velocityRatio.toFixed(1)}</div>
              </div>
            </div>
            <div style={{ marginTop: 12 }}>
              <SourceLine sources={alert.sources} />
            </div>
          </div>

          {topImage && (
            <div className="drawer-section">
              <h3>Imagen destacada · Discover</h3>
              <a href={(topPages[0] || {}).url || '#'} target="_blank" rel="noreferrer" style={{ display: 'block' }}>
                <img src={topImage} alt={alert.entity}
                     style={{ width: '100%', maxHeight: 280, objectFit: 'cover', border: '1px solid var(--rule)' }} />
              </a>
              {topPages[0] && (
                <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-3)', marginTop: 6 }}>
                  Fuente: {(topPages[0].domain || '').replace(/^www\./, '')} · score {topPages[0].score}
                </div>
              )}
            </div>
          )}

          {typeContext && typeContext.kind === 'trend' && (
            <div className="drawer-section">
              <h3>Google Trend · {typeContext.trend.title}</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10, marginBottom: 8 }}>
                <div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Tráfico aprox</div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 800, color: 'var(--accent)' }}>
                    {typeContext.trend.approxTraffic ? '~' + typeContext.trend.approxTraffic.toLocaleString() : '—'}
                  </div>
                </div>
                <div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Visto</div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 12 }}>
                    {typeContext.trend.firstSeen ? new Date(typeContext.trend.firstSeen).toLocaleString('es-ES') : '—'}
                  </div>
                </div>
              </div>
              {(typeContext.trend.newsItems || []).length > 0 && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-4)', letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: 4 }}>Noticias asociadas al trend</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                    {typeContext.trend.newsItems.slice(0, 8).map((n, i) => (
                      <a key={i} href={n.url} target="_blank" rel="noreferrer"
                         style={{ textDecoration: 'none', color: 'inherit', padding: '4px 0', borderBottom: '1px solid var(--rule-2)', display: 'flex', gap: 6 }}>
                        <span style={{ color: 'var(--accent)' }}>▸</span>
                        {n.source && <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-3)', minWidth: 120, flexShrink: 0 }}>{n.source}</span>}
                        <span style={{ flex: 1, fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.35 }}>{n.title}</span>
                      </a>
                    ))}
                  </div>
                </div>
              )}
              <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-4)', marginTop: 8 }}>
                Fuente: Google Trends ES · actualización cada 30 min
              </div>
            </div>
          )}

          {typeContext && typeContext.kind === 'category' && (
            <div className="drawer-section">
              <h3>Categoría DiscoverSnoop · {typeContext.cat.name}</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
                <div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Score</div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 800, color: 'var(--accent)' }}>{typeContext.cat.score}</div>
                </div>
                <div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Δ 24h</div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 800, color: typeContext.cat.scoreDelta24h > 0 ? 'var(--ok)' : typeContext.cat.scoreDelta24h < 0 ? 'var(--danger)' : 'var(--ink)' }}>
                    {typeContext.cat.scoreDelta24h != null ? (typeContext.cat.scoreDelta24h > 0 ? '+' : '') + typeContext.cat.scoreDelta24h : '—'}
                  </div>
                </div>
                <div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Publicaciones</div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 800 }}>{typeContext.cat.publications}</div>
                </div>
              </div>
            </div>
          )}

          {typeContext && typeContext.kind === 'headline_pattern' && (
            <div className="drawer-section">
              <h3>Patrón de titular · "{typeContext.ngram}"</h3>
              {typeContext.pattern ? (
                <div style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--ink-2)' }}>
                  Aparece <strong>{typeContext.pattern.count}</strong> veces · {typeContext.pattern.words} palabras
                </div>
              ) : (
                <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-4)' }}>
                  Patrón detectado en el poll actual. Revisar tab "Patrones" para histórico.
                </div>
              )}
            </div>
          )}

          {topPages.length > 0 && (
            <div className="drawer-section">
              <h3>Top páginas Discover · {topPages.length}</h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {topPages.slice(0, 5).map((p, i) => (
                  <a key={i} href={p.url} target="_blank" rel="noreferrer"
                     style={{ display: 'flex', gap: 8, textDecoration: 'none', color: 'inherit', padding: 6, borderBottom: '1px solid var(--rule-2)' }}>
                    {p.image && (
                      <img src={p.image} alt=""
                           style={{ width: 64, height: 40, objectFit: 'cover', border: '1px solid var(--rule)', flexShrink: 0 }} />
                    )}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: 'var(--ink)', lineHeight: 1.3, overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical' }}>
                        {p.title}
                      </div>
                      <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-3)', marginTop: 2 }}>
                        #{i + 1} · s{p.score} · {(p.domain || '').replace(/^www\./, '')}
                      </div>
                    </div>
                  </a>
                ))}
              </div>
            </div>
          )}

/* ---------------- Tweaks ---------------- */
function Tweaks({ tweaks, setTweak, visible }) {
  if (!visible) return null;
  const accents = [
    { v: '#D9342B', name: 'red' },
    { v: '#E55A12', name: 'orange' },
    { v: '#1F8A4C', name: 'green' },
    { v: '#1C5BB0', name: 'blue' },
    { v: '#8B2FC9', name: 'viral' },
    { v: '#0C0C0D', name: 'ink' },
  ];
  return (
    <div className="tweaks">
      <h4>TWEAKS</h4>
      <div className="tweak-row">
        <label>Tema</label>
        <div className="seg">
          <button className={tweaks.theme === 'light' ? 'active' : ''} onClick={() => setTweak('theme','light')}>Claro</button>
          <button className={tweaks.theme === 'dark' ? 'active' : ''} onClick={() => setTweak('theme','dark')}>Oscuro</button>
          <button className={tweaks.theme === 'terminal' ? 'active' : ''} onClick={() => setTweak('theme','terminal')}>Terminal</button>
        </div>
      </div>
      <div className="tweak-row">
        <label>Densidad</label>
        <div className="seg">
          <button className={tweaks.density === 'compact' ? 'active' : ''} onClick={() => setTweak('density','compact')}>Compacto</button>
          <button className={tweaks.density === 'dense' ? 'active' : ''} onClick={() => setTweak('density','dense')}>Denso</button>
          <button className={tweaks.density === 'comfy' ? 'active' : ''} onClick={() => setTweak('density','comfy')}>Cómodo</button>
        </div>
      </div>
      <div className="tweak-row">
        <label>Acento</label>
        <div className="swatches">
          {accents.map(a => (
            <div key={a.v}
                 className={cx('swatch', tweaks.accent === a.v && 'active')}
                 style={{ background: a.v }}
                 onClick={() => setTweak('accent', a.v)} />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Ticker breaking</label>
        <div className="seg">
          <button className={tweaks.showTicker ? 'active' : ''} onClick={() => setTweak('showTicker', true)}>On</button>
          <button className={!tweaks.showTicker ? 'active' : ''} onClick={() => setTweak('showTicker', false)}>Off</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- App ---------------- */
function App() {
  const [clock, setClock] = useState(new Date());
  const [activeNav, setActiveNav] = useState('feed');
  const [filter, setFilter] = useState('all');
  const [openAlert, setOpenAlert] = useState(null);
  const [freshId, setFreshId] = useState(null);
  // Estado único con toda la data del dashboard. Arranca con el mock de
  // fallback (data.js) y se sobreescribe con la respuesta real de /api/live-alerts.
  const [data, setData] = useState(window.DA_DATA || {});
  const alerts = data.alerts || [];
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [loaded, setLoaded] = useState(false);

  /* Apply tweaks to :root + body (no pisar theme del ThemeSwitch si ya hay localStorage) */
  useEffect(() => {
    document.body.dataset.density = tweaks.density;
    let savedTheme = null;
    try { savedTheme = localStorage.getItem('da.theme'); } catch (e) {}
    if (!savedTheme) {
      document.body.dataset.theme = tweaks.theme;
    }
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    document.documentElement.style.setProperty('--accent-deep', tweaks.accent);
  }, [tweaks]);

  /* live clock */
  useEffect(() => {
    const i = setInterval(() => setClock(new Date()), 1000);
    return () => clearInterval(i);
  }, []);

  /* Fetch real data + refresh cada 60s */
  useEffect(() => {
    let cancelled = false;
    async function load() {
      if (typeof window.refreshDashboardData !== 'function') return;
      const mapped = await window.refreshDashboardData();
      if (cancelled) return;
      if (mapped) {
        setData(mapped);
        setLoaded(true);
      }
    }
    load();
    const i = setInterval(load, 60_000);
    const onUpd = () => {
      if (window.DA_DATA) setData(window.DA_DATA);
    };
    window.addEventListener('da-data-updated', onUpd);
    return () => { cancelled = true; clearInterval(i); window.removeEventListener('da-data-updated', onUpd); };
  }, []);

  /* ESC closes drawer */
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') setOpenAlert(null); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  /* Edit mode protocol */
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    setTweaks(prev => {
      const next = { ...prev, [k]: v };
      try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch(e){}
      return next;
    });
  };

  /* Filter alerts (supports prefix match via trailing ':*') */
  const filtered = useMemo(() => {
    if (filter === 'all') return alerts;
    if (filter.endsWith(':*')) {
      const prefix = filter.slice(0, -2);
      return alerts.filter(a => (a.type || '').startsWith(prefix));
    }
    return alerts.filter(a => a.type === filter);
  }, [alerts, filter]);
  const counts = useMemo(() => {
    const c = { all: alerts.length };
    for (const a of alerts) c[a.type] = (c[a.type] || 0) + 1;
    return c;
  }, [alerts]);

  const kicker = (label, meta) => (
    <>
      <div className="kicker">{label} <span className="bar"></span>{meta ? <span className="meta">{meta}</span> : null}</div>
    </>
  );

  const schemaNews = (data._raw && data._raw.schemaNews) || {};
  const sucNews = schemaNews.sucesos || [];
  const legNews = schemaNews.legal || [];

  const viewFeed = (
    <>
      <section className="main">
        {kicker('Feed en vivo', `${filtered.length} alertas · orden por tiempo · actualiza cada 60s${loaded ? '' : ' · cargando…'}`)}
        <FilterBar filter={filter} setFilter={setFilter} counts={counts} />
        {(sucNews.length > 0 || legNews.length > 0) && (
          <SchemaNewsBlock sucesos={sucNews} legal={legNews} />
        )}
        {filtered.map(a => (
          <AlertRow key={a.id} alert={a} fresh={freshId === a.id} onOpen={setOpenAlert} />
        ))}
        {filtered.length === 0 && (
          <div style={{ padding: '32px 0', textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-4)' }}>
            Sin alertas con este filtro. Prueba otro tipo o espera al próximo poll.
          </div>
        )}
        <div style={{ padding: '18px 0', textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-4)', letterSpacing: '0.08em' }}>
          — {loaded ? 'DATOS EN VIVO' : 'CARGANDO DATOS'} · REFRESCO AUTOMÁTICO CADA 60s —
        </div>
      </section>
      <aside className="side">
        <GapsPanel gaps={data.gaps || []} />
        <EntitiesPanel entities={data.entities || []} />
        <TrendsPanel trends={data.trends || []} />
        <XTrendsPanel xTrends={data.xTrends || []} />
        {(data.spikes && data.spikes.length > 0) && <SpikePanel spikes={data.spikes} />}
        {(data.concordances && data.concordances.length > 0) && <ConcordancePanel concordances={data.concordances} />}
        <TopMediaPanel media={data.topMedia || []} />
        <FormulasPanel formulas={data.formulas || []} />
        {(data.headlinePatterns && data.headlinePatterns.length > 0) && <PatternsPanel patterns={data.headlinePatterns} />}
        {(data.weekly && data.weekly.length > 0) && <WeeklyPanel weekly={data.weekly} />}
        <div style={{ fontFamily: 'var(--mono)', fontSize: 9, color: 'var(--ink-4)', letterSpacing: '0.06em', padding: '14px 0', borderTop: '1px solid var(--rule)', textTransform: 'uppercase' }}>
          Discover Alerts · redacción · interno
        </div>
      </aside>
    </>
  );

  const viewSinglePanel = (title, meta, content) => (
    <section className="main" style={{ gridColumn: '1 / -1' }}>
      {kicker(title, meta)}
      {content}
    </section>
  );

  // Wrapper sin kicker para paneles que YA tienen su propio <div className="kicker">
  // (evita cabecera duplicada).
  const viewPanelOnly = (content) => (
    <section className="main" style={{ gridColumn: '1 / -1' }}>
      {content}
    </section>
  );

  let body = viewFeed;
  if (activeNav === 'huecos') {
    body = viewPanelOnly(<GapsPanel gaps={data.gaps || []} />);
  } else if (activeNav === 'entidades') {
    body = viewPanelOnly(<EntitiesPanel entities={data.entities || []} />);
  } else if (activeNav === 'trends') {
    body = viewPanelOnly(<TrendsPanel trends={data.trends || []} />);
  } else if (activeNav === 'xtrends') {
    body = viewPanelOnly(<XTrendsPanel xTrends={data.xTrends || []} />);
  } else if (activeNav === 'sucesos') {
    body = viewSinglePanel(
      'Sucesos',
      'capa editorial YMYL · tratamiento factual, atribución obligatoria, sin hipérbole',
      <SucesosView data={data} onOpenAlert={setOpenAlert} />
    );
  } else if (activeNav === 'boe') {
    body = viewSinglePanel(
      'BOE',
      (data.boe ? `${data.boe.totalItems} disposiciones hoy · ${(data.boe.sections||[]).length} secciones` : 'cargando…'),
      <BoeView boe={data.boe} rawEntities={data._raw?.entities} />
    );
  } else if (activeNav === 'publishers') {
    body = viewSinglePanel(
      'Publishers DS · gap analysis',
      'dominios que DiscoverSnoop está viendo · marca cuáles ya tienes con feed',
      <PublishersView />
    );
  } else if (activeNav === 'categorias') {
    body = viewPanelOnly(<CategoriesPanel categories={(data._raw && data._raw.categories) || []} />);
  } else if (activeNav === 'medios') {
    body = viewPanelOnly(<TopMediaPanel media={data.topMedia || []} />);
  } else if (activeNav === 'formulas') {
    body = viewPanelOnly(<FormulasPanel formulas={data.formulas || []} />);
  } else if (activeNav === 'patrones') {
    body = viewPanelOnly(<PatternsPanel patterns={data.headlinePatterns || []} />);
  } else if (activeNav === 'historico') {
    body = viewPanelOnly(<WeeklyPanel weekly={data.weekly || []} />);
  } else if (activeNav === 'predicciones') {
    body = viewSinglePanel(
      'Predicciones estacionales YoY',
      'entidades/categorías/patrones que explotaron esta misma semana ISO en años anteriores',
      <PredictionsView />
    );
  } else if (activeNav === 'cultural') {
    body = viewSinglePanel(
      'Cultural — Netflix + FlixPatrol ES',
      'top 10 streaming en España · Netflix TSV oficial (semanal) + FlixPatrol (diario)',
      <CulturalView />
    );
  } else if (activeNav === 'aemet') {
    body = viewSinglePanel(
      'AEMET — avisos meteorológicos',
      'scraping del HTML oficial · correlación futura con picos de cobertura',
      <AemetView />
    );
  } else if (activeNav === 'configuracion') {
    body = viewSinglePanel(
      'Configuración del sistema',
      'estado actual · read-only',
      <ConfigView data={data} />
    );
  }

  // Filtrados por topic 'sucesos' (capa con tratamiento YMYL estricto)
  const sucesosAlerts = useMemo(() => {
    const raw = (data._raw && data._raw.recentAlerts) || [];
    return raw
      .filter(r => (r.alertTopic || r.topic) === 'sucesos' ||
                   ['first_mover','own_media_absent','trends_without_discover','meneame_hot']
                     .includes(r.type) && (r.alert && r.alert.topic === 'sucesos'))
      .length;
  }, [data._raw]);

  const navCounts = {
    feed: alerts.length,
    huecos: (data.gaps || []).length,
    sucesos: sucesosAlerts,
    boe: (data.boe && data.boe.totalItems) || 0,
    trends: (data.trends || []).length,
    xtrends: (data.xTrends || []).length,
    entidades: (data.entities || []).length,
    categorias: (data._raw && data._raw.categories ? data._raw.categories.length : 0),
  };

  return (
    <>
      <Masthead activeNav={activeNav} setActiveNav={setActiveNav} clock={clock} counts={navCounts} />
      {tweaks.showTicker && <Ticker data={data} />}
      <Pollers pollers={data.pollers || []} />
      <div className="shell">{body}</div>
      <Drawer alert={openAlert} onClose={() => setOpenAlert(null)} data={data} />
      <Tweaks tweaks={tweaks} setTweak={setTweak} visible={tweaksVisible} />
    </>
  );
}

function SucesosView({ data, onOpenAlert }) {
  const raw = (data._raw || {});
  // Entidades con topic=sucesos
  const entities = (raw.entities || [])
    .filter(e => (e.topic || '').toLowerCase() === 'sucesos' ||
                 (e.category || '').toLowerCase().includes('sensitive'))
    .slice(0, 20);
  // Alertas con topic=sucesos (campo directo o dentro de alert)
  const alerts = (raw.recentAlerts || [])
    .filter(r => (r.topic === 'sucesos') || (r.alert && r.alert.topic === 'sucesos'))
    .slice(0, 30);
  // Huecos con topic=sucesos
  const gaps = (raw.opportunities || [])
    .filter(o => (o.topic || '').toLowerCase() === 'sucesos')
    .slice(0, 10);

  const hasSignal = entities.length + alerts.length + gaps.length > 0;

  const row = (item, key) => (

           padding: 'var(--space-5) 0',
           borderBottom: '1px solid var(--rule-2)',

    <div style={{
      marginTop: 'var(--space-7)',
      padding: 'var(--space-8) var(--space-9)',
      border: '2px solid var(--warn)',
      background: 'rgba(232, 145, 0, 0.04)',
    }}>
      <div style={{ marginBottom: 'var(--space-8)', fontFamily: 'var(--mono)', fontSize: 'var(--text-xs)', color: 'var(--warn)', letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 700 }}>

      </div>
      <p style={{ fontFamily: 'var(--sans)', fontSize: 'var(--text-lg)', lineHeight: 1.5, color: 'var(--ink-2)', margin: '0 0 var(--space-10)' }}>
        Capa de sucesos (crímenes, desapariciones, emergencias, tribunales). Google
        Discover aplica criterios más estrictos a este tipo de contenido.
        <strong> Regla editorial:</strong> atribución obligatoria (Guardia Civil, Policía
        Nacional, fuentes judiciales), lenguaje factual y sin hipérbole, sin clickbait
        ni curiosity-gap. Las fórmulas sugeridas ya están filtradas por YMYL.
      </p>

      {!hasSignal && (
        <div style={{ padding: 'var(--space-10)', textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 'var(--text-sm)', color: 'var(--ink-4)' }}>
          Sin señal de sucesos activa en este momento.<br/>
          El clasificador sigue vigilando (keywords: asesinato, tiroteo, guardia civil, desaparecido, atraco…).
        </div>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 'var(--space-10)' }}>
        {gaps.length > 0 && (
          <div>
            <div className="kicker">Huecos sucesos <span className="bar"></span> <span className="meta">{gaps.length} activos</span></div>
            {gaps.map((g, i) => row({
              title: g.title,
              detail: `${(g.kind || '').replace('_', ' ')} · ${g.detail || ''}`,
            }, 'g' + i))}
          </div>
        )}
        {alerts.length > 0 && (
          <div>
            <div className="kicker">Alertas recientes <span className="bar"></span> <span className="meta">últimas 6h · topic=sucesos</span></div>
            {alerts.map((a, i) => row({
              title: a.title,
              detail: `${a.type}${a.subtype ? '/' + a.subtype : ''} · ${a.detail || ''}`,
            }, 'a' + i))}
          </div>
        )}
        {entities.length > 0 && (
          <div style={{ gridColumn: '1 / -1' }}>
            <div className="kicker">Entidades clasificadas · con publicaciones <span className="bar"></span> <span className="meta">{entities.length} entidades</span></div>
            {entities.map((e, i) => (
              <div key={'e' + i} style={{ padding: 'var(--space-6) 0', borderBottom: '1px solid var(--rule-2)' }}>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 6 }}>
                  <span style={{ fontFamily: 'var(--sans)', fontSize: 'var(--text-base)', fontWeight: 700, color: 'var(--ink)' }}>{e.name}</span>
                  {e.category && <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-3)' }}>{e.category}</span>}
                  <span style={{ marginLeft: 'auto', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-3)' }}>
                    score {e.score} · pos #{e.position} · {e.publications} pubs
                  </span>
                </div>
                {/* Publicaciones: RSS articles + Discover pages */}
                {(() => {
                  const rssItems = (e.matchingArticles || []).map(a => ({ kind: 'rss', title: a.title, url: a.link, source: a.feedName }));
                  const dsItems = (e.topPages || []).map(p => ({ kind: 'ds', title: p.title, url: p.url, source: (p.domain || '').replace(/^www\./, ''), score: p.score }));
                  const all = [...rssItems, ...dsItems].slice(0, 8);
                  if (all.length === 0) return <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-4)', marginLeft: 10 }}>sin publicaciones asociadas</div>;
                  return (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 2, marginLeft: 10 }}>
                      {all.map((p, j) => (
                        <a key={j} href={p.url} target="_blank" rel="noreferrer"
                           style={{ fontFamily: 'var(--sans)', fontSize: 'var(--text-sm)', color: 'var(--ink-2)', textDecoration: 'none', lineHeight: 1.35, display: 'flex', gap: 6 }}>
                          <span style={{ color: p.kind === 'ds' ? 'var(--accent)' : 'var(--ink-4)', fontFamily: 'var(--mono)', fontSize: 10, flexShrink: 0, minWidth: 30 }}>
                            {p.kind === 'ds' ? 'DS' : 'RSS'}
                          </span>
                          <span style={{ color: 'var(--ink-3)', fontSize: 10, flexShrink: 0, minWidth: 100, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {p.source || ''}
                          </span>
                          <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {p.title}
                          </span>
                        </a>
                      ))}
                    </div>
                  );
                })()}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- BOE view (disposiciones oficiales hoy) ---------------- */
function BoeView({ boe, rawEntities }) {
  if (!boe) {
    return (
      <div style={{ padding: 'var(--space-10)', textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 'var(--text-sm)', color: 'var(--ink-4)' }}>
        Cargando BOE…
      </div>
    );
  }
  if (boe.totalItems === 0) {
    return (
      <div style={{ padding: 'var(--space-10)', textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 'var(--text-sm)', color: 'var(--ink-4)' }}>
        Hoy no se publica BOE (domingo o festivo).<br/>
        Próxima publicación: siguiente día hábil a las 07:00.
      </div>
    );
  }

  // Normalizar nombres de entidades para cruzar con los items BOE
  const entityNorms = (rawEntities || [])
    .filter(e => e.name && e.name.length > 4)
    .map(e => ({ name: e.name, norm: e.name.toLowerCase() }));

  // Crossmatch: para cada item BOE, ver si contiene alguna entidad Discover
  const crossmatch = (title) => {
    const lo = (title || '').toLowerCase();
    return entityNorms.filter(e => lo.includes(e.norm)).map(e => e.name).slice(0, 3);
  };

  return (
    <div style={{ marginTop: 'var(--space-7)' }}>
      <div style={{
        padding: 'var(--space-5) var(--space-8)',
        marginBottom: 'var(--space-9)',
        background: 'var(--paper-3)',
        borderLeft: '3px solid var(--info)',
        fontFamily: 'var(--sans)',
        fontSize: 'var(--text-base)',
        color: 'var(--ink-2)',
        lineHeight: 1.5,
      }}>
        <strong>BOE — Boletín Oficial del Estado.</strong> Disposiciones publicadas hoy,
        agrupadas por sección. Fuente primaria editorial: normativa + nombramientos +
        subvenciones + anuncios. Ventaja: lo leemos antes que se escriba sobre ello en
        medios (media 15-60 min).
      </div>

      {(boe.sections || []).map((sec, si) => (
        <div key={si} style={{ marginBottom: 'var(--space-10)' }}>
          <div className="kicker" style={{ marginBottom: 'var(--space-5)' }}>
            {sec.name}
            <span className="bar"></span>
            <span className="meta">{sec.count} disposiciones</span>
          </div>
          {sec.items.map((it, ii) => {
            const matches = crossmatch(it.titulo || '');
            return (
              <div key={ii} style={{
                padding: 'var(--space-5) 0',
                borderBottom: '1px solid var(--rule-2)',
              }}>
                <div style={{
                  fontFamily: 'var(--mono)',
                  fontSize: 'var(--text-2xs)',
                  color: 'var(--ink-4)',
                  letterSpacing: '0.08em',
                  textTransform: 'uppercase',
                  marginBottom: 'var(--space-1)',
                }}>
                  {it.departamento} · {it.epigrafe}
                </div>
                <div style={{
                  fontFamily: 'var(--serif)',
                  fontSize: 'var(--text-lg)',
                  fontWeight: 600,
                  color: 'var(--ink)',
                  lineHeight: 1.35,
                  marginBottom: 'var(--space-3)',
                }}>
                  {it.titulo}
                </div>
                <div style={{ display: 'flex', gap: 'var(--space-5)', alignItems: 'center', flexWrap: 'wrap' }}>
                  {matches.length > 0 && (
                    <span style={{
                      fontFamily: 'var(--mono)',
                      fontSize: 'var(--text-xs)',
                      color: 'var(--accent)',
                      fontWeight: 700,
                      letterSpacing: '0.06em',
                      textTransform: 'uppercase',
                    }}>
                      ✓ Cruza con Discover: {matches.join(', ')}
                    </span>
                  )}
                  {it.urlHtml && (
                    <a href={it.urlHtml} target="_blank" rel="noreferrer"
                       style={{ fontFamily: 'var(--mono)', fontSize: 'var(--text-xs)', color: 'var(--ink-3)', textDecoration: 'none' }}>
                      ↗ Ver en BOE
                    </a>
                  )}
                  {it.urlPdf && (
                    <a href={it.urlPdf} target="_blank" rel="noreferrer"
                       style={{ fontFamily: 'var(--mono)', fontSize: 'var(--text-xs)', color: 'var(--ink-4)', textDecoration: 'none' }}>
                      ↗ PDF
                    </a>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

                <td style={{ padding: '4px 6px', color: 'var(--ink)' }}>

                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

function PredictionsView() {
  const [state, setState] = useState({ loading: true, data: null, error: null });
  const [kindFilter, setKindFilter] = useState('entity');

  useEffect(() => {
    let alive = true;
    fetch('/api/predictions', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
      .then(d => { if (alive) setState({ loading: false, data: d, error: null }); })
      .catch(e => { if (alive) setState({ loading: false, data: null, error: e.message }); });
    return () => { alive = false; };
  }, []);

  if (state.loading) return <div style={{ padding: 16, fontFamily: 'var(--mono)', color: 'var(--ink-3)' }}>Calculando predicciones…</div>;
  if (state.error) return <div style={{ padding: 16, color: 'var(--danger)' }}>Error: {state.error}</div>;
  const { summary = {}, predictions = [], targetWeek } = state.data || {};

  const filtered = predictions.filter(p => p.kind === kindFilter);
  const confColor = c => c === 'high' ? 'var(--ok)' : c === 'medium' ? 'var(--warn)' : 'var(--ink-4)';

  const chip = (id, label, count) => (
    <span key={id} onClick={() => setKindFilter(id)}
          style={{
            cursor: 'pointer', padding: '4px 10px', fontFamily: 'var(--mono)', fontSize: 11,
            border: '1px solid var(--rule)', background: kindFilter === id ? 'var(--ink)' : 'transparent',
            color: kindFilter === id ? 'var(--paper)' : 'var(--ink)', marginRight: 6,
          }}>
      {label} <strong>{count}</strong>
    </span>
  );

  const countEnt = predictions.filter(p => p.kind === 'entity').length;
  const countCat = predictions.filter(p => p.kind === 'category').length;
  const countPat = predictions.filter(p => p.kind === 'pattern').length;

  const lowData = (summary.yearsInHistory || []).length < 2;

  return (
    <div>
      <div style={{ display: 'flex', gap: 6, marginBottom: 12, flexWrap: 'wrap' }}>
        {chip('entity', 'Entidades', countEnt)}
        {chip('category', 'Categorías', countCat)}
        {chip('pattern', 'Patrones', countPat)}
      </div>
      <div style={{ padding: '8px 10px', background: 'var(--paper-3)', border: '1px solid var(--rule)', marginBottom: 12, fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-3)' }}>
        Semana target: <strong style={{ color: 'var(--ink)' }}>{targetWeek}</strong> · histórico: {summary.weeksInHistory || 0} semanas · años: {(summary.yearsInHistory || []).join(', ') || '(ninguno previo)'} · {(summary.byConfidence && summary.byConfidence.high) || 0} high-conf · {(summary.byConfidence && summary.byConfidence.medium) || 0} medium · {(summary.byConfidence && summary.byConfidence.low) || 0} low
        {lowData && (
          <div style={{ marginTop: 8, color: 'var(--warn)' }}>
            ⚠ Se necesita al menos 1 año de weeklyHistory acumulado para predicciones fiables. Hoy hay {(summary.yearsInHistory || []).length} año(s) en memoria. Se puede sembrar con backfill de DS histórico (pendiente).
          </div>
        )}
      </div>
      {filtered.length === 0 ? (
        <div style={{ padding: 16, fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--ink-4)' }}>
          Sin predicciones de tipo {kindFilter}. {lowData ? 'Acumulando histórico…' : 'Prueba a bajar el threshold o ampliar tolerance.'}
        </div>
      ) : (
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: 'var(--mono)', fontSize: 12 }}>
            <thead>
              <tr style={{ borderBottom: '1px solid var(--rule)' }}>
                <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--ink-3)' }}>Término</th>
                <th style={{ textAlign: 'right', padding: '6px 8px', color: 'var(--ink-3)' }}>Avg menciones</th>
                <th style={{ textAlign: 'right', padding: '6px 8px', color: 'var(--ink-3)' }}>Años</th>
                <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--ink-3)' }}>Confianza</th>
                <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--ink-3)' }}>Semanas pasadas</th>
                <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--ink-3)' }}>Top feeds</th>
                <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--ink-3)' }}>Estado</th>
              </tr>
            </thead>
            <tbody>
              {filtered.slice(0, 60).map((p, i) => (
                <tr key={i} style={{ borderBottom: '1px solid var(--rule-2)' }}>
                  <td style={{ padding: '6px 8px', color: 'var(--ink)' }}>{p.term}</td>
                  <td style={{ padding: '6px 8px', textAlign: 'right', color: 'var(--ink-2)' }}>{p.pastMentionsAvg}</td>
                  <td style={{ padding: '6px 8px', textAlign: 'right', color: 'var(--ink-2)' }}>{p.nYears}</td>
                  <td style={{ padding: '6px 8px', color: confColor(p.confidence) }}>{p.confidence}</td>
                  <td style={{ padding: '6px 8px', color: 'var(--ink-3)', fontSize: 11 }}>{(p.pastWeeks || []).join(', ')}</td>
                  <td style={{ padding: '6px 8px', color: 'var(--ink-3)', fontSize: 11, maxWidth: 240, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{(p.pastTopFeeds || []).join(', ') || '—'}</td>
                  <td style={{ padding: '6px 8px' }}>
                    {p.currentlyHot
                      ? <span style={{ color: 'var(--warn)' }}>ya caliente</span>
                      : <span style={{ color: 'var(--ok)' }}>latente</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function PublishersView() {
  const [state, setState] = useState({ loading: true, data: null, error: null });
  const [filter, setFilter] = useState('notTracked'); // 'notTracked' | 'tracked' | 'all'
  const [q, setQ] = useState('');

  useEffect(() => {
    let alive = true;
    fetch('/api/ds-publishers', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
      .then(d => { if (alive) setState({ loading: false, data: d, error: null }); })
      .catch(e => { if (alive) setState({ loading: false, data: null, error: e.message }); });
    return () => { alive = false; };
  }, []);

  if (state.loading) return <div style={{ padding: 16, fontFamily: 'var(--mono)', color: 'var(--ink-3)' }}>Cargando dominios de DiscoverSnoop…</div>;
  if (state.error) return <div style={{ padding: 16, color: 'var(--danger)' }}>Error: {state.error}</div>;
  const { summary = {}, notTracked = [], tracked = [] } = state.data || {};
  let rows = filter === 'tracked' ? tracked : filter === 'all' ? [...notTracked, ...tracked] : notTracked;
  const ql = q.trim().toLowerCase();
  if (ql) rows = rows.filter(r => (r.domain || '').toLowerCase().includes(ql) || (r.sampleTitles || []).some(t => t.toLowerCase().includes(ql)));

  const chip = (id, label, count) => (
    <span key={id} onClick={() => setFilter(id)}
          style={{
            cursor: 'pointer', padding: '4px 10px', fontFamily: 'var(--mono)', fontSize: 11,
            border: '1px solid var(--rule)', background: filter === id ? 'var(--ink)' : 'transparent',
            color: filter === id ? 'var(--paper)' : 'var(--ink)', marginRight: 6,
          }}>
      {label} <strong>{count}</strong>
    </span>
  );

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12, flexWrap: 'wrap' }}>
        {chip('notTracked', 'Sin feed (gap)', summary.notTracked || 0)}
        {chip('tracked', 'Con feed', summary.tracked || 0)}
        {chip('all', 'Todos', (summary.tracked || 0) + (summary.notTracked || 0))}
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="filtrar dominio o título…"
               style={{ marginLeft: 'auto', padding: '4px 8px', fontFamily: 'var(--mono)', fontSize: 11,
                        border: '1px solid var(--rule)', background: 'var(--paper)', color: 'var(--ink)', minWidth: 220 }} />
      </div>
      <div style={{ padding: '8px 10px', background: 'var(--paper-3)', border: '1px solid var(--rule)', marginBottom: 12, fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-3)' }}>
        DS ha visto <strong style={{ color: 'var(--ink)' }}>{(summary.tracked || 0) + (summary.notTracked || 0)}</strong> dominios en el último poll.
        De ellos <strong style={{ color: 'var(--warn)' }}>{summary.notTracked || 0}</strong> no tienen feed todavía — candidatos a sumar en <code>feeds.json</code>.
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: 'var(--mono)', fontSize: 12 }}>
          <thead>
            <tr style={{ borderBottom: '1px solid var(--rule)' }}>
              <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--ink-3)' }}>Dominio</th>
              <th style={{ textAlign: 'right', padding: '6px 8px', color: 'var(--ink-3)' }}>Pages</th>
              <th style={{ textAlign: 'right', padding: '6px 8px', color: 'var(--ink-3)' }}>Max score</th>
              <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--ink-3)' }}>Estado</th>
              <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--ink-3)' }}>Titular muestra</th>
            </tr>
          </thead>
          <tbody>
            {rows.slice(0, 200).map(r => (
              <tr key={r.domain} style={{ borderBottom: '1px solid var(--rule-2)' }}>
                <td style={{ padding: '6px 8px' }}>
                  <a href={`https://${r.domain}`} target="_blank" rel="noopener noreferrer" style={{ color: 'var(--ink)' }}>{r.domain}</a>
                </td>
                <td style={{ padding: '6px 8px', textAlign: 'right', color: 'var(--ink-2)' }}>{r.pageCount}</td>
                <td style={{ padding: '6px 8px', textAlign: 'right', color: 'var(--ink-2)' }}>{r.maxScore}</td>
                <td style={{ padding: '6px 8px' }}>
                  {r.tracked
                    ? <span style={{ color: 'var(--ok)' }}>✓ tracked</span>
                    : <span style={{ color: 'var(--warn)' }}>○ sin feed</span>}
                </td>
                <td style={{ padding: '6px 8px', color: 'var(--ink-3)', maxWidth: 440, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {(r.sampleTitles || [])[0] || '—'}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {rows.length > 200 && (
        <div style={{ marginTop: 10, color: 'var(--ink-4)', fontFamily: 'var(--mono)', fontSize: 11 }}>
          Mostrando 200 de {rows.length}. Usa el filtro para acotar.
        </div>
      )}
    </div>
  );
}

function ConfigView({ data }) {
  const totals = data._totals || {};
  const pollers = data.pollers || [];
  const row = (label, value) => (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid var(--rule-2)', fontFamily: 'var(--mono)', fontSize: 12 }}>
      <span style={{ color: 'var(--ink-3)' }}>{label}</span>
      <strong style={{ color: 'var(--ink)' }}>{value}</strong>
    </div>
  );
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 28, marginTop: 14 }}>
      <div>
        <div className="kicker">Pollers <span className="bar"></span></div>
        {pollers.map(p => (
          <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: '1px solid var(--rule-2)', fontFamily: 'var(--mono)', fontSize: 12 }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: p.status === 'ok' ? 'var(--ok)' : 'var(--warn)' }} />
            <strong style={{ minWidth: 120 }}>{p.label}</strong>
            <span style={{ color: 'var(--ink-3)' }}>cada {Math.round(p.cadence / 60)}m</span>
            <span style={{ marginLeft: 'auto', color: 'var(--ink-4)' }}>hace {p.last}s</span>
          </div>
        ))}
      </div>
      <div>
        <div className="kicker">Estado del cache <span className="bar"></span></div>
        {row('Entidades tracked', (totals.entitiesTracked || 0).toLocaleString())}
        {row('Categorías tracked', (totals.categoriesTracked || 0).toLocaleString())}
        {row('Google Trends cacheados', (totals.googleTrendsCached || 0).toLocaleString())}
        {row('X trends cacheados', (totals.xTrendsCached || 0).toLocaleString())}
        {row('Artículos RSS cacheados', (totals.mediaArticlesCached || 0).toLocaleString())}
      </div>
      <div>
        <div className="kicker">Reglas editoriales activas <span className="bar"></span></div>
        {row('Fórmulas con uso últimos 30d', (data.formulas || []).length)}
        {row('Alertas en feed', (data.alerts || []).length)}
        {row('Huecos activos', (data.gaps || []).length)}
        {row('Concordancias', (data.concordances || []).length)}
        {row('Patrones detectados', (data.headlinePatterns || []).length)}
      </div>
      <div>
        <div className="kicker">Endpoints <span className="bar"></span></div>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 11, lineHeight: 1.8, color: 'var(--ink-3)' }}>
          <div><a href="/api/live-alerts" target="_blank" style={{ color: 'var(--accent)' }}>/api/live-alerts</a> — feed + paneles</div>
          <div><a href="/api/historical-discover" target="_blank" style={{ color: 'var(--accent)' }}>/api/historical-discover</a> — histórico DS</div>
          <div><a href="/api/weekly-history" target="_blank" style={{ color: 'var(--accent)' }}>/api/weekly-history</a> — agregado semanal</div>
          <div><a href="/api/feeds" target="_blank" style={{ color: 'var(--accent)' }}>/api/feeds</a> — listado de feeds</div>
          <div><a href="/api/ds-publishers" target="_blank" style={{ color: 'var(--accent)' }}>/api/ds-publishers</a> — dominios DS vs feeds (gap analysis)</div>
          <div><a href="/api/predictions" target="_blank" style={{ color: 'var(--accent)' }}>/api/predictions</a> — predicciones estacionales YoY</div>
          <div><a href="/api/routing" target="_blank" style={{ color: 'var(--accent)' }}>/api/routing</a> — rutas Slack</div>
          <div><a href="/classic.html" target="_blank" style={{ color: 'var(--accent)' }}>/classic.html</a> — dashboard legacy</div>
        </div>
        <div style={{ marginTop: 14, padding: 10, background: 'var(--paper-3)', border: '1px solid var(--rule)', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-3)' }}>
          Edición de thresholds, topics, fórmulas, feeds y routing: por ahora se hace por PR al repo
          (ficheros <code>topics.json</code>, <code>headline-formulas.json</code>, <code>routing.json</code>, <code>feeds.json</code>).
          Siguiente iteración: editores inline y <code>PATCH</code> a Upstash con override runtime.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
