<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DISCOVER ALERTS — Newsroom Live</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;0,8..60,800;0,8..60,900;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="adapter.js"></script>
</head>
<body data-density="dense" data-theme="light" data-screen-label="Newsroom Live">

<div id="root"></div>

<script>
/* EDITMODE defaults */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#D9342B",
  "density": "comfy",
  "theme": "light",
  "fontHeadline": "serif",
  "showTicker": true
}/*EDITMODE-END*/;
</script>

<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="panels.jsx"></script>

<script type="text/babel" data-presets="react">
const D = window.DA_DATA;

/* ---------------- Masthead ---------------- */
function Masthead({ activeNav, setActiveNav, clock }) {
  const navs = [
    { id: 'feed', label: 'Feed en vivo', count: 8 },
    { id: 'huecos', label: 'Huecos' },
    { id: 'entidades', label: 'Entidades' },
    { id: 'medios', label: 'Medios' },
    { id: 'formulas', label: 'Fórmulas' },
    { id: 'patrones', label: 'Patrones' },
    { id: 'historico', label: 'Histórico' },
    { id: 'configuracion', label: 'Config' },
  ];
  const fmtDate = clock.toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
  const fmtTime = clock.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  return (
    <header className="masthead">
      <div className="masthead-row">
        <div className="wordmark">
          <span className="dot"></span>
          DISCOVER<span style={{ color: 'var(--accent)' }}>·</span>ALERTS
        </div>
        <div className="datetime">
          <span>{fmtDate.toUpperCase()}</span>
          <span>·</span>
          <span>{fmtTime} CET</span>
          <span className="live">LIVE</span>
        </div>
      </div>
      <nav className="masthead-nav">
        {navs.map(n => (
          <div key={n.id}
               className={cx('nav-item', activeNav === n.id && 'active')}
               onClick={() => setActiveNav(n.id)}>
            {n.label}
            {n.count ? <span className="count">{n.count}</span> : null}
          </div>
        ))}
      </nav>
    </header>
  );
}

/* ---------------- Pollers status ---------------- */
function Pollers({ pollers }) {
  return (
    <div className="pollers">
      <span style={{ color: 'var(--ink-4)', marginRight: 4 }}>Fuentes</span>
      {pollers.map(p => (
        <div key={p.id} className={cx('poller', p.status !== 'ok' && p.status)}>
          <span className="pill"></span>
          <span className="label">{p.label}</span>
          <span className="t">· {p.last}s · cada {Math.round(p.cadence/60)}m</span>
        </div>
      ))}
      <span style={{ marginLeft: 'auto', color: 'var(--ink-4)' }}>Próxima rotación en 00:13</span>
    </div>
  );
}

/* ---------------- Ticker ---------------- */
function Ticker() {
  const items = [
    { t: 'Sánchez', v: 'score 94', up: true },
    { t: 'Lamine Yamal', v: '+22%', up: true },
    { t: 'DANA Valencia', v: 'trends +412%', up: true },
    { t: 'Rosalía', v: 'wiki +820%', up: true },
    { t: 'BCE', v: '2,25% sin cambios', up: false },
    { t: 'OpenAI GPT-6', v: 'primicia', up: true },
    { t: 'SpaceX→Marte', v: 'cabida ES', up: true },
    { t: 'Ozempic', v: '-8', up: false },
    { t: 'Eurovisión 2026', v: '+12', up: true },
    { t: 'Feijóo', v: '-12', up: false },
    { t: 'Real Madrid–City', v: 'hueco', up: true },
    { t: 'Huelga transporte MAD', v: '47m sin cubrir', up: false },
  ];
  const row = (k) => (
    <React.Fragment key={k}>
      {items.map((it, i) => (
        <span key={i} className="ticker-item">
          <strong>{it.t}</strong><span className="sep">▸</span>
          <span className={it.up ? 'up' : 'dn'}>{it.v}</span>
        </span>
      ))}
    </React.Fragment>
  );
  return (
    <div className="ticker">
      <div className="ticker-label">BREAKING</div>
      <div className="ticker-track">
        <div className="ticker-move">{row('a')}{row('b')}</div>
      </div>
    </div>
  );
}

/* ---------------- Filter bar ---------------- */
function FilterBar({ filter, setFilter, counts }) {
  const chips = [
    { id: 'all', label: 'Todas', c: counts.all },
    { id: 'triple_match', label: 'Triple match', c: counts.triple_match },
    { id: 'trends_without_discover', label: 'Hueco SEO', c: counts.trends_without_discover },
    { id: 'discover_1h', label: 'Discover 1h', c: counts.discover_1h },
    { id: 'wikipedia_surge', label: 'Wikipedia surge', c: counts.wikipedia_surge },
    { id: 'meneame_hot', label: 'Menéame hot', c: counts.meneame_hot },
    { id: 'us_relevant', label: 'USA→ES', c: counts.us_relevant },
    { id: 'headline_pattern', label: 'Patrón titular', c: counts.headline_pattern },
  ];
  return (
    <div className="filter-bar">
      {chips.map(c => (
        <span key={c.id}
              className={cx('chip', filter === c.id && 'active')}
              onClick={() => setFilter(c.id)}>
          {c.label}{c.c != null ? <span className="c">{c.c}</span> : null}
        </span>
      ))}
      <span style={{ marginLeft: 'auto', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-4)', letterSpacing: '0.06em' }}>
        ORDEN · <strong style={{ color: 'var(--ink)' }}>TIEMPO REAL</strong> · <span>SCORE</span> · <span>VELOCIDAD</span>
      </span>
    </div>
  );
}

/* ---------------- Drawer detail ---------------- */
function Drawer({ alert, onClose }) {
  if (!alert) return null;
  return (
    <>
      <div className={cx('drawer-backdrop', alert && 'open')} onClick={onClose}></div>
      <aside className={cx('drawer', alert && 'open')}>
        <button className="drawer-close" onClick={onClose}>ESC · cerrar</button>
        <div className="drawer-inner">
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 6 }}>
            <Tag kind="accent">{alert.typeLabel}</Tag>
            <Tag kind="ghost">{alert.category}</Tag>
            <VelocityBadge velocity={alert.velocity} ratio={alert.velocityRatio} />
          </div>
          <h1>{alert.headline}</h1>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-3)', letterSpacing: '0.04em', marginBottom: 4 }}>
            {alert.ts} · {alert.ago} · entidad ▸ <strong style={{ color: 'var(--ink)' }}>{alert.entity}</strong>
          </div>
          <p style={{ fontFamily: 'var(--serif)', fontSize: 15, lineHeight: 1.5, color: 'var(--ink-2)', margin: '10px 0 4px' }}>{alert.snippet}</p>

          <div className="drawer-section">
            <h3>Señales de esta alerta</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Score Discover</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 800, color: 'var(--accent)' }}>{alert.discoverScore ?? '—'}</div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Posición feed</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 800 }}>{alert.feedPos != null ? '#'+alert.feedPos : '—'}</div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Pubs. propias</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 800 }}>{alert.publications}</div>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.06em', color: 'var(--ink-4)', textTransform: 'uppercase' }}>Velocidad</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 26, fontWeight: 800 }}>×{alert.velocityRatio.toFixed(1)}</div>
              </div>
            </div>
            <div style={{ marginTop: 12 }}>
              <SourceLine sources={alert.sources} />
            </div>
          </div>

          <div className="drawer-section">
            <h3>Imagen destacada</h3>
            <div className="drawer-image-placeholder">
              {alert.image ? `${alert.image.w}×${alert.image.h} · ${alert.image.ratio}` : 'sin imagen'}
              <div className="check">
                <span style={{ color: alert.image?.ok ? 'var(--ok)' : 'var(--accent)', fontWeight: 700 }}>
                  {alert.image?.ok ? '✓ VÁLIDA' : (alert.image ? '✗ ' + (alert.image.reason || 'no válida') : '✗ FALTA')}
                </span>
                <span>DISCOVER-READY · ratio 16:9 · ≥1200px</span>
              </div>
            </div>
          </div>

          <div className="drawer-section">
            <h3>Fórmulas sugeridas · 3 variantes</h3>
            {alert.formulas.map((f, i) => (
              <div key={i} className="formula-suggest">
                <span className="num">{i+1}</span>
                <span>{f}</span>
              </div>
            ))}
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-4)', marginTop: 10, letterSpacing: '0.05em' }}>
              GENERADAS EN BASE A FÓRMULAS GANADORAS · {alert.category.toUpperCase()}
            </div>
          </div>

          <div className="drawer-section">
            <h3>Cita capturada</h3>
            <blockquote className="quote">
              “{alert.snippet}”
            </blockquote>
          </div>

          <div className="drawer-section">
            <h3>Entidades relacionadas</h3>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {alert.related.map((r, i) => <Tag key={i} kind="ghost">{r}</Tag>)}
            </div>
          </div>

          <div className="drawer-section" style={{ display: 'flex', gap: 8 }}>
            <button style={{
              flex: 1, padding: '10px 14px', background: 'var(--accent)', color: '#fff',
              border: 'none', fontFamily: 'var(--mono)', fontSize: 11, fontWeight: 700,
              letterSpacing: '0.08em', textTransform: 'uppercase', cursor: 'pointer', borderRadius: 2
            }}>
              Abrir brief en Slack
            </button>
            <button style={{
              flex: 1, padding: '10px 14px', background: 'var(--ink)', color: 'var(--paper)',
              border: 'none', fontFamily: 'var(--mono)', fontSize: 11, fontWeight: 700,
              letterSpacing: '0.08em', textTransform: 'uppercase', cursor: 'pointer', borderRadius: 2
            }}>
              Asignar redactor
            </button>
            <button style={{
              padding: '10px 14px', background: 'transparent', color: 'var(--ink-3)',
              border: '1px solid var(--rule)', fontFamily: 'var(--mono)', fontSize: 11, fontWeight: 600,
              letterSpacing: '0.08em', textTransform: 'uppercase', cursor: 'pointer', borderRadius: 2
            }}>
              Silenciar
            </button>
          </div>
        </div>
      </aside>
    </>
  );
}

/* ---------------- Tweaks ---------------- */
function Tweaks({ tweaks, setTweak, visible }) {
  if (!visible) return null;
  const accents = [
    { v: '#D9342B', name: 'red' },
    { v: '#E55A12', name: 'orange' },
    { v: '#1F8A4C', name: 'green' },
    { v: '#1C5BB0', name: 'blue' },
    { v: '#8B2FC9', name: 'viral' },
    { v: '#0C0C0D', name: 'ink' },
  ];
  return (
    <div className="tweaks">
      <h4>TWEAKS</h4>
      <div className="tweak-row">
        <label>Tema</label>
        <div className="seg">
          <button className={tweaks.theme === 'light' ? 'active' : ''} onClick={() => setTweak('theme','light')}>Claro</button>
          <button className={tweaks.theme === 'dark' ? 'active' : ''} onClick={() => setTweak('theme','dark')}>Oscuro</button>
        </div>
      </div>
      <div className="tweak-row">
        <label>Densidad</label>
        <div className="seg">
          <button className={tweaks.density === 'compact' ? 'active' : ''} onClick={() => setTweak('density','compact')}>Compacto</button>
          <button className={tweaks.density === 'dense' ? 'active' : ''} onClick={() => setTweak('density','dense')}>Denso</button>
          <button className={tweaks.density === 'comfy' ? 'active' : ''} onClick={() => setTweak('density','comfy')}>Cómodo</button>
        </div>
      </div>
      <div className="tweak-row">
        <label>Acento</label>
        <div className="swatches">
          {accents.map(a => (
            <div key={a.v}
                 className={cx('swatch', tweaks.accent === a.v && 'active')}
                 style={{ background: a.v }}
                 onClick={() => setTweak('accent', a.v)} />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Ticker breaking</label>
        <div className="seg">
          <button className={tweaks.showTicker ? 'active' : ''} onClick={() => setTweak('showTicker', true)}>On</button>
          <button className={!tweaks.showTicker ? 'active' : ''} onClick={() => setTweak('showTicker', false)}>Off</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- App ---------------- */
function App() {
  const [clock, setClock] = useState(new Date());
  const [activeNav, setActiveNav] = useState('feed');
  const [filter, setFilter] = useState('all');
  const [openAlert, setOpenAlert] = useState(null);
  const [freshId, setFreshId] = useState(null);
  // Estado único con toda la data del dashboard. Arranca con el mock de
  // fallback (data.js) y se sobreescribe con la respuesta real de /api/live-alerts.
  const [data, setData] = useState(window.DA_DATA || {});
  const alerts = data.alerts || [];
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [loaded, setLoaded] = useState(false);

  /* Apply tweaks to :root + body */
  useEffect(() => {
    document.body.dataset.density = tweaks.density;
    document.body.dataset.theme = tweaks.theme;
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    /* derive deep + soft */
    const hex = tweaks.accent;
    document.documentElement.style.setProperty('--accent-deep', hex);
  }, [tweaks]);

  /* live clock */
  useEffect(() => {
    const i = setInterval(() => setClock(new Date()), 1000);
    return () => clearInterval(i);
  }, []);

  /* Fetch real data + refresh cada 60s */
  useEffect(() => {
    let cancelled = false;
    async function load() {
      if (typeof window.refreshDashboardData !== 'function') return;
      const mapped = await window.refreshDashboardData();
      if (cancelled) return;
      if (mapped) {
        setData(mapped);
        setLoaded(true);
      }
    }
    load();
    const i = setInterval(load, 60_000);
    const onUpd = () => {
      if (window.DA_DATA) setData(window.DA_DATA);
    };
    window.addEventListener('da-data-updated', onUpd);
    return () => { cancelled = true; clearInterval(i); window.removeEventListener('da-data-updated', onUpd); };
  }, []);

  /* ESC closes drawer */
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') setOpenAlert(null); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  /* Edit mode protocol */
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    setTweaks(prev => {
      const next = { ...prev, [k]: v };
      try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch(e){}
      return next;
    });
  };

  /* Filter alerts */
  const filtered = useMemo(
    () => filter === 'all' ? alerts : alerts.filter(a => a.type === filter),
    [alerts, filter]
  );
  const counts = useMemo(() => {
    const c = { all: alerts.length };
    for (const a of alerts) c[a.type] = (c[a.type] || 0) + 1;
    return c;
  }, [alerts]);

  return (
    <>
      <Masthead activeNav={activeNav} setActiveNav={setActiveNav} clock={clock} />
      {tweaks.showTicker && <Ticker />}
      <Pollers pollers={data.pollers || []} />

      <div className="shell">
        <section className="main">
          <div className="kicker">
            Feed en vivo <span className="bar"></span>
            <span className="meta">
              {filtered.length} alertas · orden por tiempo · actualiza cada 60s {loaded ? '' : '· cargando…'}
            </span>
          </div>
          <h2 className="section-title">Lo que está pasando ahora mismo en la web hispanohablante</h2>

          <FilterBar filter={filter} setFilter={setFilter} counts={counts} />

          {filtered.map(a => (
            <AlertRow key={a.id} alert={a} fresh={freshId === a.id} onOpen={setOpenAlert} />
          ))}

          {filtered.length === 0 && (
            <div style={{ padding: '32px 0', textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-4)' }}>
              Sin alertas con este filtro. Prueba otro tipo o espera al próximo poll.
            </div>
          )}

          <div style={{ padding: '18px 0', textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--ink-4)', letterSpacing: '0.08em' }}>
            — {loaded ? 'DATOS EN VIVO' : 'CARGANDO DATOS'} · REFRESCO AUTOMÁTICO CADA 60s —
          </div>
        </section>

        <aside className="side">
          <GapsPanel gaps={data.gaps || []} />
          <EntitiesPanel entities={data.entities || []} />
          {(data.spikes && data.spikes.length > 0) && <SpikePanel spikes={data.spikes} />}
          {(data.concordances && data.concordances.length > 0) && <ConcordancePanel concordances={data.concordances} />}
          <TopMediaPanel media={data.topMedia || []} />
          <FormulasPanel formulas={data.formulas || []} />
          {(data.headlinePatterns && data.headlinePatterns.length > 0) && <PatternsPanel patterns={data.headlinePatterns} />}
          {(data.weekly && data.weekly.length > 0) && <WeeklyPanel weekly={data.weekly} />}
          <div style={{ fontFamily: 'var(--mono)', fontSize: 9, color: 'var(--ink-4)', letterSpacing: '0.06em', padding: '14px 0', borderTop: '1px solid var(--rule)', textTransform: 'uppercase' }}>
            © 2026 Discover Alerts · build 2026.04.19 · redacción · interno
          </div>
        </aside>
      </div>

      <Drawer alert={openAlert} onClose={() => setOpenAlert(null)} />
      <Tweaks tweaks={tweaks} setTweak={setTweak} visible={tweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
