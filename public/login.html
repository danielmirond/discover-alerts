<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Entrar · Discover Alerts</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: var(--bg, #0b0d10); color: var(--fg, #e6e6e6); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card {
      width: 100%; max-width: 420px;
      background: var(--panel, #12151a);
      border: 1px solid var(--border, #2a2f37);
      border-radius: 8px; padding: 32px;
    }
    .login-card h1 { margin: 0 0 8px 0; font-size: 18px; letter-spacing: .08em; text-transform: uppercase; }
    .login-card p.lead { margin: 0 0 24px 0; color: var(--muted, #8a94a6); font-size: 13px; line-height: 1.5; }
    .login-card label { display: block; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted, #8a94a6); margin-bottom: 6px; }
    .login-card input[type=email] {
      width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px;
      background: var(--bg, #0b0d10); color: var(--fg, #e6e6e6);
      border: 1px solid var(--border, #2a2f37); border-radius: 6px; box-sizing: border-box;
    }
    .login-card input[type=email]:focus-visible { outline: 2px solid var(--accent, #36D1DC); outline-offset: 2px; }
    .login-card button {
      width: 100%; margin-top: 16px; padding: 12px; font-family: inherit; font-size: 13px;
      background: var(--accent, #36D1DC); color: #000; border: 0; border-radius: 6px; cursor: pointer;
      font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    }
    .login-card button:disabled { opacity: .5; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 13px; line-height: 1.5; }
    .msg.ok { color: #5bd66a; }
    .msg.err { color: #ff6b6b; }
    .foot { margin-top: 24px; font-size: 11px; color: var(--muted, #8a94a6); }
  </style>
</head>
<body>
  <main class="login-wrap">
    <form class="login-card" id="f">
      <h1>Discover Alerts</h1>
      <p class="lead">Introduce tu email. La solicitud pasa por revisión manual — si se aprueba, recibirás un magic link.</p>
      <label for="email">Email</label>
      <input id="email" type="email" name="email" autocomplete="email" required placeholder="tu@medio.com">
      <button type="submit" id="btn">Enviar enlace</button>
      <div class="msg" id="msg" role="status" aria-live="polite"></div>
      <p class="foot">Cada solicitud se revisa manualmente.</p>
    </form>
  </main>
  <script>
    const f = document.getElementById('f');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;
      btn.disabled = true;
      msg.className = 'msg';
      msg.textContent = 'Enviando…';
      try {
        const resp = await fetch('/api/auth/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        if (resp.ok) {
          msg.className = 'msg ok';
          msg.textContent = 'Solicitud enviada. Si se aprueba, recibirás el enlace en tu email.';
        } else {
          const data = await resp.json().catch(() => ({}));
          msg.className = 'msg err';
          msg.textContent = data.error || 'No se pudo enviar. Inténtalo de nuevo.';
          btn.disabled = false;
        }
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = 'Error de red. Inténtalo de nuevo.';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
